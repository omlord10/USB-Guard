  </ul>

</small></address>
</div><!-- doc-content -->

<!-- Авто-раскрытие всего дерева навигации слева -->
<script type="text/javascript">
  (function () {
    function expandAll() {
      var tree = document.getElementById('nav-tree');
      if (!tree) return false;
      // все свёрнутые узлы имеют ссылку-стрелку с классом arrow и символ ►
      var changed = false;
      var arrows = tree.querySelectorAll('a.arrow');
      for (var i = 0; i < arrows.length; i++) {
        var a = arrows[i];
        // ► (►) = свёрнут; раскрываем кликом
        if (a.textContent.indexOf('►') !== -1) {
          a.click();
          changed = true;
        }
      }
      return changed;
    }
    var tries = 0;
    var timer = setInterval(function () {
      var changed = expandAll();
      tries++;
      // останавливаемся, когда раскрывать больше нечего или вышел лимит попыток
      if ((!changed && tries > 3) || tries > 60) clearInterval(timer);
    }, 250);
  })();
</script>
</body>
</html>
